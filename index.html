<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definitely Correct Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <h1>Calculator</h1>

    <input id="display" readonly>

    <div class="buttons">
        <button class="special" onclick="clearDisplay()">C</button>
        <button class="special" onclick="backspace()">⌫</button>
        <button class="special" onclick="press('%')">%</button>
        <button class="operator" onclick="press('/')">÷</button>

        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="operator" onclick="press('*')">×</button>

        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button class="operator" onclick="press('-')">−</button>

        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button class="operator" onclick="press('+')">+</button>

        <button class="zero" onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button class="operator" onclick="calculate()">=</button>
    </div>

<p id="message"></p>

<div id="paymentPopup" class="popup">
    <div class="popup-box">
        <h2>Pay £0.10</h2>
        <p>Pay to reveal your definitely correct answer.</p>

        <div id="paypal-button-container"></div>

        <button onclick="closePaymentPopup()">Cancel</button>
    </div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=AQpOHjb9c4cyQdOMUP9X36kz3IrgcRGhA7cSC21XNQn05vmJfNwwKj2Y-9t9k2NnQwShvD8QX4MxfEtG&currency=GBP"></script>
<script src="script.js"></script>

</body>
</html>
